name: BlackHole
options:
  bundleIdPrefix: com.blackholesim
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    CLANG_ENABLE_MODULES: YES

targets:
  BlackHole-iOS:
    type: application
    platform: iOS
    sources:
      - path: BlackHole
      - path: BlackHole-iOS
    info:
      path: BlackHole-iOS/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: BlackHole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blackholesim.app.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        MTL_FAST_MATH: YES
        SWIFT_OBJC_BRIDGING_HEADER: BlackHole/Shared/BlackHole-Bridging-Header.h

  BlackHole-macOS:
    type: application
    platform: macOS
    sources:
      - path: BlackHole
      - path: BlackHole-macOS
    info:
      path: BlackHole-macOS/Info.plist
      properties:
        CFBundleDisplayName: BlackHole
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: YES
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blackholesim.app.mac
        GENERATE_INFOPLIST_FILE: NO
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        MTL_FAST_MATH: YES
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_OBJC_BRIDGING_HEADER: BlackHole/Shared/BlackHole-Bridging-Header.h
