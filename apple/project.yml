name: BlackHole
options:
  bundleIdPrefix: com.orchestrsim
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    visionOS: "2.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "LQ69YVA9KK"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    CLANG_ENABLE_MODULES: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BlackHole-iOS:
    type: application
    platform: iOS
    sources:
      - path: BlackHole
      - path: BlackHole-iOS
    info:
      path: BlackHole-iOS/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: BlackHole
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orchestrsim.blackholesim
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        MTL_FAST_MATH: YES
        SWIFT_OBJC_BRIDGING_HEADER: BlackHole/Shared/BlackHole-Bridging-Header.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  BlackHole-visionOS:
    type: application
    platform: visionOS
    sources:
      - path: BlackHole
        excludes:
          - "MetalView.swift"
          - "ContentView.swift"
      - path: BlackHole-visionOS
    info:
      path: BlackHole-visionOS/Info.plist
      properties:
        CFBundleDisplayName: BlackHole
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSWorldSensingUsageDescription: "BlackHole uses head tracking so the simulation responds to your viewpoint."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orchestrsim.blackholesim
        TARGETED_DEVICE_FAMILY: "7"
        GENERATE_INFOPLIST_FILE: NO
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        MTL_FAST_MATH: YES
        SWIFT_OBJC_BRIDGING_HEADER: BlackHole/Shared/BlackHole-Bridging-Header.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  BlackHole-macOS:
    type: application
    platform: macOS
    sources:
      - path: BlackHole
      - path: BlackHole-macOS
    info:
      path: BlackHole-macOS/Info.plist
      properties:
        CFBundleDisplayName: BlackHole
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: YES
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.entertainment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orchestrsim.blackholesim
        GENERATE_INFOPLIST_FILE: NO
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        MTL_FAST_MATH: YES
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_OBJC_BRIDGING_HEADER: BlackHole/Shared/BlackHole-Bridging-Header.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: BlackHole-macOS/BlackHole-macOS.entitlements
